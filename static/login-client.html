<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Aluno</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --surface: #ffffff;
            --bg: #f3f4f6;
            --text: #1f2937;
            --text-light: #6b7280;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background: linear-gradient(135deg, #f3f4f6 0%, #dbeafe 100%);
            color: var(--text);
        }

        .card { 
            background: var(--surface); 
            padding: 2.5rem; 
            border-radius: 0.75rem; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); 
            width: 100%;
            max-width: 400px; 
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary);
        }

        h2 {
            text-align: center;
            color: var(--text);
            margin-bottom: 0.5rem;
            font-weight: 700;
            font-size: 1.5rem;
        }

        .subtitle {
            text-align: center;
            color: var(--text-light);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.25rem;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            transition: color 0.3s;
        }

        input { 
            width: 100%; 
            padding: 0.75rem 1rem 0.75rem 2.5rem; 
            border: 1px solid #e5e7eb; 
            border-radius: 0.5rem; 
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            outline: none;
            background: #f9fafb;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }

        input:focus + i {
            color: var(--primary);
        }

        button { 
            width: 100%; 
            padding: 0.75rem; 
            background: var(--primary); 
            color: white; 
            border: none; 
            border-radius: 0.5rem; 
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer; 
            transition: all 0.3s ease;
            margin-top: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        button:hover { 
            background: var(--primary-dark); 
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        button:active {
            transform: translateY(0);
        }

        a { 
            display: block; 
            text-align: center; 
            margin-top: 1.5rem; 
            color: var(--text-light); 
            text-decoration: none; 
            font-size: 0.875rem; 
            transition: color 0.3s;
        }

        a:hover {
            color: var(--primary);
            text-decoration: underline;
        }
        
        .icon-header {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        
        .icon-circle {
            width: 60px;
            height: 60px;
            background: #eff6ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="card animate__animated animate__fadeInUp">
        <div class="icon-header">
            <div class="icon-circle">
                <i class="fas fa-graduation-cap"></i>
            </div>
        </div>
        <h2>Portal do Aluno</h2>
        <div class="subtitle">Entre para acessar seus conteúdos</div>
        
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Usuário">
        </div>
        
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Senha">
        </div>

        <button onclick="login()">
            <span>Acessar</span>
            <i class="fas fa-sign-in-alt"></i>
        </button>
        
        <a href="/register-client">Criar nova conta de aluno</a>
    </div>

    <script>
        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            
            if (!user || !pass) return alert("Preencha todos os campos");

            try {
                // Check if user exists
                const res = await fetch(`/get-kv?key=user:client:${user}`);
                if (res.status === 404) return alert("Usuário não encontrado");
                
                const data = await res.json();
                if (data.password !== pass) return alert("Senha incorreta");

                // Set Cookies (simples implementation for MVP)
                document.cookie = `user=${user}; path=/`;
                document.cookie = `name=${data.name}; path=/`;
                document.cookie = `course=${data.course}; path=/`;
                
                window.location.href = '/client';
            } catch (e) {
                console.error(e);
                alert("Erro ao tentar login");
            }
        }
    </script>
</body>
</html>
